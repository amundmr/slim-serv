services:
  mqtt:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - /var/log/ramdisk:/mosquitto/log

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    restart: unless-stopped
    volumes:
      - ./zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
      - /var/log/ramdisk:/app/data/log  # Push Z2M logs to the RAM disk
    ports:
      - "8080:8080" # Optional: Z2M Web Frontend
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0 # Update this based on your SkyConnect port
    environment:
      - TZ=Europe/Oslo